name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, regressões e build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:ci

  e2e:
    name: E2E — ${{ matrix.project }}
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: chrome
            browser: chrome
          - project: edge
            browser: msedge
          - project: firefox
            browser: firefox
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps ${{ matrix.browser }}
      - run: npm run build:web
      - run: npx playwright test --project=${{ matrix.project }}
      - name: Publicar diagnóstico do Playwright
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ matrix.project }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14
